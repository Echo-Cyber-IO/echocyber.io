[build]
command = "npm run prod"
publish = "build_production"

[build.environment]
PHP_VERSION = "8.3"
NODE_VERSION = "20"

[functions."assess"]
timeout = 26

[[redirects]]
  from = "/listen"
  to = "https://pod.link/1894903133"
  status = 301
  force = true

[[redirects]]
  from = "/measure"
  to = "/sprint/measure"
  status = 301
